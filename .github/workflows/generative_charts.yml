name: Build and publish charts
on:
  push:
    paths:
      - 'data/**'            # rebuild when data changes
      - 'plotly_charts.py'   # rebuild when script changes

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        # Either provide requirements.txt in the repo, or replace this with:
        # run: pip install plotly pandas
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install plotly pandas; fi

      - name: Run plot script
        run: python plotly_charts.py

      - name: Commit generated html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Portfolio/*.html || true
          git commit -m "Auto-generate charts" || echo "No changes to commit"
          git push
